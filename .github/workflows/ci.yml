name: CI

on:
  push:
    branches:
      - '**'
  pull_request:

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    env:
      PORT: 3001
      AUTH_SECRET: ci-test-secret
      APP_URL: http://localhost:5173

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build application
        run: npm run build
